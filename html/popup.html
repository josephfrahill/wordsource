<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Source</title>
    <link rel="stylesheet" href="../css/popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>WordSource</h1>
      </header>

      <div id="default-view">
        <p class="tip">
          Highlight any word or phrase on a page to see its etymology, or press
          <kbd id="shortcut-key">Ctrl+Q</kbd> after selecting text.
        </p>
      </div>

      <div id="missing-words-div">
        <section class="stat-row">
          <div class="stat">
            <span class="stat-label">Missing words tracked</span>
            <span class="stat-value" id="missing-count">—</span>
          </div>
        </section>

        <section class="actions">
          <button id="export-btn" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path
                d="M7 1v8M4 6l3 3 3-3M2 11h10"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Export missing words
          </button>

          <button id="clear-btn" class="btn btn-danger">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path
                d="M2 4h10M5 4V2h4v2M11 4l-.8 8H3.8L3 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Clear tracked words
          </button>
        </section>
      </div>

      <div id="status-msg" class="status hidden"></div>
    </div>
    <script type="module" src="../popup.js"></script>

    <footer class="attribution">
      <a
        href="https://www.flaticon.com/free-icons/scroll"
        title="scroll icons"
        target="_blank"
        rel="noopener noreferrer"
        >Scroll icons by Freepik – Flaticon</a
      >
    </footer>
  </body>
</html>
